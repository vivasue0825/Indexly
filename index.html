<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexly - Home</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      --accent: #38bdf8;
      --up-color: #ef4444;
      --down-color: #3b82f6;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    .nickname-container {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .nickname-text {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
    }

    .section-header {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    #index-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .index-card:active {
      transform: scale(0.98);
    }

    .price-info {
      text-align: right;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .change-info {
      text-align: right;
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .up {
      color: var(--up-color);
    }

    .down {
      color: var(--down-color);
    }

    .offline {
      color: var(--text-sub);
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <header>
      <div class="nickname-container" onclick="location.href='index.html'"><span class="nickname-text"
          id="nick-area">Hi, Indexly</span></div>
      <button class="icon-btn" onclick="location.href='setting.html'"><i data-lucide="settings"></i></button>
    </header>
    <div class="section-header">Market Overview</div>
    <div id="index-list"></div>
  </div>
  <script>
    async function init() {
      const name = localStorage.getItem('indexly_nickname') || 'Indexly';
      document.getElementById('nick-area').innerText = `Hi, ${name} ✏️`;
      const saved = localStorage.getItem('indexly_indices');
      let list = saved ? JSON.parse(saved) : [{ name: "달러/원 환율", ticker: "USD/KRW" }, { name: "나스닥 100", ticker: "NASDAQ100" }];

      try {
        const res = await fetch('http://localhost:8000/api/summary');
        if (!res.ok) throw new Error();
        render(await res.json());
      } catch (e) {
        // [예외 처리] 통신 불가 시 종목명은 유지하고 시세 정보는 -- 로 표기
        render(list.map(i => ({ ...i, price: "--", diff: "--", percent: "--", state: "even" })));
      }
    }
    function render(data) {
      document.getElementById('index-list').innerHTML = data.map(item => `
        <div class="index-card" onclick="location.href='chart.html?id=${encodeURIComponent(item.ticker)}'">
          <div class="name-info"><div class="name" style="font-weight:600">${item.name}</div><div style="font-size:0.75rem; color:var(--text-sub)">${item.ticker}</div></div>
          <div class="price-info ${item.price === '--' ? 'offline' : ''}">${item.price.toLocaleString()}</div>
          <div class="change-info ${item.state}">
            ${item.percent === '--' ? '--' : `<span>${item.state === 'up' ? '▲' : '▼'} ${Math.abs(item.diff).toFixed(2)}</span><span>(${item.percent > 0 ? '+' : ''}${item.percent.toFixed(2)}%)</span>`}
          </div>
        </div>`).join('');
      lucide.createIcons();
    }
    window.onload = init;
  </script>
</body>

</html>
