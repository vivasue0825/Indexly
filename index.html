<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexly - Home</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      --accent: #38bdf8;
      --up-color: #ef4444;
      --down-color: #3b82f6;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    .nickname-text {
      font-size: 1.25rem;
      font-weight: 800;
      cursor: pointer;
    }

    .section-header {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    #index-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .index-card:active {
      transform: scale(0.98);
    }

    .price-info {
      text-align: right;
      font-weight: 700;
      font-size: 1.1rem;
      font-family: 'Roboto Mono', monospace;
    }

    .change-info {
      text-align: right;
      display: flex;
      flex-direction: column;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .up {
      color: var(--up-color);
    }

    .down {
      color: var(--down-color);
    }

    .offline {
      color: var(--text-sub);
    }
  </style>
</head>

<body>
  <div class="app-container">
    <header>
      <div class="nickname-text" id="nick-area">Hi, Indexly ✏️</div>
      <button onclick="location.href='setting.html'"
        style="background:none; border:none; color:var(--text-sub); cursor:pointer;"><i
          data-lucide="settings"></i></button>
    </header>
    <div class="section-header">Market Overview</div>
    <div id="index-list"></div>
  </div>
  <script>
    async function init() {
      const name = localStorage.getItem('indexly_nickname') || 'Indexly';
      document.getElementById('nick-area').innerText = `Hi, ${name} ✏️`;

      // 기본 5개 종목 설정
      const defaultIndices = [
        { name: "달러/원 환율", ticker: "USD/KRW" },
        { name: "엔/원 환율", ticker: "JPY/KRW" },
        { name: "나스닥 100", ticker: "NASDAQ100" },
        { name: "국제 금", ticker: "GOLD" },
        { name: "국제 은", ticker: "SILVER" }
      ];

      try {
        // 백엔드 DB 서버에서 데이터 가져오기
        const res = await fetch('http://localhost:8000/api/summary');
        if (!res.ok) throw new Error();
        const data = await res.json();

        // 데이터가 비어있으면(DB 초기상태) 기본 리스트로 렌더링
        if (data.length === 0) throw new Error("Empty data");
        render(data);
      } catch (e) {
        // 서버 오프라인 또는 초기화 시 -- 표기 및 기본 5개 종목 출력
        const saved = JSON.parse(localStorage.getItem('indexly_indices')) || defaultIndices;
        render(saved.map(i => ({ ...i, last_price: 0, diff: 0, percent: 0, offline: true })));
      }
    }

    function render(data) {
      document.getElementById('index-list').innerHTML = data.map(item => `
                <div class="index-card" onclick="location.href='chart.html?id=${encodeURIComponent(item.ticker)}'">
                    <div>
                        <div style="font-weight:600">${item.name || item.ticker}</div>
                        <div style="font-size:0.75rem; color:var(--text-sub)">Market Index</div>
                    </div>
                    <div class="price-info ${item.offline ? 'offline' : ''}">${item.offline ? '--' : item.last_price.toLocaleString()}</div>
                    <div class="change-info ${item.offline ? 'offline' : (item.percent >= 0 ? 'up' : 'down')}">
                        <span>${item.offline ? '--' : (item.percent >= 0 ? '▲' : '▼') + ' ' + Math.abs(item.diff).toFixed(2)}</span>
                        <span>${item.offline ? '' : '(' + (item.percent >= 0 ? '+' : '') + item.percent.toFixed(2) + '%)'}</span>
                    </div>
                </div>`).join('');
      lucide.createIcons();
    }
    window.onload = init;
  </script>
</body>

</html>
