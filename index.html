<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexly - Home</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      --accent: #38bdf8;
      --up-color: #ef4444;
      --down-color: #3b82f6;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    .nickname-container {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .nickname-text {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .section-header {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    #index-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      align-items: center;
    }

    .name-info .name {
      font-size: 1rem;
      font-weight: 600;
    }

    .name-info .ticker {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    .price-info {
      text-align: right;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .change-info {
      text-align: right;
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .up {
      color: var(--up-color);
    }

    .down {
      color: var(--down-color);
    }

    .even {
      color: var(--text-sub);
    }
  </style>
</head>

<body>

  <div class="app-container">
    <header>
      <div class="nickname-container">
        <span class="nickname-text" id="nickname-display">Hi, Indexly</span>
      </div>
      <button class="icon-btn" onclick="location.href='setting.html'">
        <i data-lucide="settings"></i>
      </button>
    </header>

    <div class="section-header">Market Overview</div>
    <div id="index-list"></div>
  </div>

  <script>
    // 1. 데이터 가져오기 (localStorage 우선)
    function getIndices() {
      const saved = localStorage.getItem('indexly_indices');
      const defaultData = [
        { id: 1, name: "달러/원 환율", ticker: "USD/KRW", price: 1324.50, diff: 4.20, percent: 0.32, state: "up" },
        { id: 2, name: "엔/원 환율", ticker: "JPY/KRW", price: 882.10, diff: -1.50, percent: -0.17, state: "down" },
        { id: 3, name: "국제 금", ticker: "GOLD", price: 2150.30, diff: 12.80, percent: 0.60, state: "up" },
        { id: 4, name: "국제 은", ticker: "SILVER", price: 24.15, diff: -0.05, percent: -0.21, state: "down" }
      ];

      if (!saved) {
        localStorage.setItem('indexly_indices', JSON.stringify(defaultData));
        return defaultData;
      }

      const savedList = JSON.parse(saved);
      // 저장된 리스트 순서에 맞춰서 더미 시세 데이터 매칭
      return savedList.map(item => {
        const mock = defaultData.find(d => d.ticker === item.ticker) || { price: 100.0, diff: 0, percent: 0, state: "even" };
        return { ...item, ...mock };
      });
    }

    // 2. 화면 렌더링
    function renderHome() {
      const list = getIndices();
      const container = document.getElementById('index-list');
      container.innerHTML = list.map(item => `
            <div class="index-card">
                <div class="name-info">
                    <div class="name">${item.name}</div>
                    <div class="ticker">${item.ticker}</div>
                </div>
                <div class="price-info">${item.price.toLocaleString(undefined, { minimumFractionDigits: 2 })}</div>
                <div class="change-info ${item.state}">
                    <span>${item.state === 'up' ? '▲' : item.state === 'down' ? '▼' : '-'} ${Math.abs(item.diff).toFixed(2)}</span>
                    <span>(${item.percent > 0 ? '+' : ''}${item.percent.toFixed(2)}%)</span>
                </div>
            </div>
        `).join('');
    }

    // 3. 닉네임 로드
    function loadNickname() {
      const savedName = localStorage.getItem('indexly_nickname');
      if (savedName) {
        document.getElementById('nickname-display').innerText = `Hi, ${savedName}`;
      }
    }

    window.onload = () => {
      loadNickname();
      renderHome();
      lucide.createIcons();
    };
  </script>
</body>

</html>
