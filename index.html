<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexly - Home</title>
  <!-- Lucide Icons for UI elements -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      --accent: #38bdf8;
      --up-color: #ef4444;
      --down-color: #3b82f6;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* Responsive Container: Max 600px for PC, Full for Mobile */
    .app-container {
      width: 100%;
      max-width: 600px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    /* HEADER SECTION */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    .nickname-container {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .nickname-text {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .nickname-input {
      background: var(--card-bg);
      border: 1px solid var(--accent);
      color: var(--text-main);
      font-size: 1.25rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      outline: none;
      width: 150px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .icon-btn:hover {
      color: var(--text-main);
    }

    /* MARKET SECTION */
    .section-header {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    /* INDEX LIST */
    #index-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      align-items: center;
      transition: transform 0.1s, border-color 0.2s;
      cursor: pointer;
    }

    .index-card:active {
      transform: scale(0.98);
      border-color: var(--accent);
    }

    .name-info .name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .name-info .ticker {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    .price-info {
      text-align: right;
      font-family: 'Roboto Mono', monospace;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .change-info {
      text-align: right;
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .up {
      color: var(--up-color);
    }

    .down {
      color: var(--down-color);
    }

    .even {
      color: var(--text-sub);
    }

    /* Skeleton Animation Placeholder */
    .loading-text {
      text-align: center;
      color: var(--text-sub);
      padding: 40px;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <header>
      <div class="nickname-container" id="nickname-box">
        <span id="greeting">Hi, </span>
        <span id="nickname-display" class="nickname-text"></span>
        <input type="text" id="nickname-edit" class="nickname-input" style="display: none;">
        <i data-lucide="pencil" size="16" class="icon-btn"></i>
      </div>
      <button class="icon-btn" onclick="goToSetting()">
        <i data-lucide="settings"></i>
      </button>
    </header>

    <div class="section-header">Market Overview</div>

    <div id="index-list">
      <!-- 리스트가 여기에 렌더링됩니다 -->
    </div>
  </div>

  <script>
    // 1. 초기 데이터 및 로직 정의 (기능정의서 준수)
    const DEFAULT_INDICES = [
      { id: 1, name: "달러/원 환율", ticker: "USD/KRW", price: 1324.50, diff: 4.20, percent: 0.32, state: "up" },
      { id: 2, name: "엔/원 환율", ticker: "JPY/KRW", price: 882.10, diff: -1.50, percent: -0.17, state: "down" },
      { id: 3, name: "국제 금", ticker: "GOLD (GC=F)", price: 2150.30, diff: 12.80, percent: 0.60, state: "up" },
      { id: 4, name: "국제 은", ticker: "SILVER (SI=F)", price: 24.15, diff: -0.05, percent: -0.21, state: "down" },
      { id: 5, name: "국제 구리", ticker: "COPPER (HG=F)", price: 3.85, diff: 0.00, percent: 0.00, state: "even" }
    ];

    // 2. 닉네임 관리 로직
    const nicknameDisplay = document.getElementById('nickname-display');
    const nicknameEdit = document.getElementById('nickname-edit');
    const nicknameBox = document.getElementById('nickname-box');

    function initNickname() {
      let savedName = localStorage.getItem('indexly_nickname');
      if (!savedName) {
        // 랜덤 닉네임 생성 (Indexly_ + 4자리 숫자)
        savedName = `Indexly_${Math.floor(1000 + Math.random() * 9000)}`;
        localStorage.setItem('indexly_nickname', savedName);
      }
      nicknameDisplay.innerText = savedName;
    }

    // 닉네임 수정 기능 (Inline Edit)
    nicknameBox.addEventListener('click', (e) => {
      if (nicknameEdit.style.display === 'none') {
        nicknameEdit.value = nicknameDisplay.innerText;
        nicknameDisplay.style.display = 'none';
        nicknameEdit.style.display = 'block';
        nicknameEdit.focus();
      }
    });

    function saveNickname() {
      let newName = nicknameEdit.value.trim();
      if (newName.length > 0) {
        if (newName.length > 10) newName = newName.substring(0, 10); // 10자 제한
        localStorage.setItem('indexly_nickname', newName);
        nicknameDisplay.innerText = newName;
      }
      nicknameDisplay.style.display = 'block';
      nicknameEdit.style.display = 'none';
    }

    nicknameEdit.addEventListener('blur', saveNickname);
    nicknameEdit.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveNickname();
    });

    // 3. 리스트 렌더링 로직 (부분 렌더링 구조)
    function renderList() {
      const listContainer = document.getElementById('index-list');
      listContainer.innerHTML = DEFAULT_INDICES.map(item => `
            <div class="index-card" onclick="goToChart('${item.ticker}')">
                <div class="name-info">
                    <div class="name">${item.name}</div>
                    <div class="ticker">${item.ticker}</div>
                </div>
                <div class="price-info">
                    ${item.price.toLocaleString(undefined, { minimumFractionDigits: 2 })}
                </div>
                <div class="change-info ${item.state}">
                    <span>${item.state === 'up' ? '▲' : item.state === 'down' ? '▼' : '-'} ${Math.abs(item.diff).toFixed(2)}</span>
                    <span>(${item.percent > 0 ? '+' : ''}${item.percent.toFixed(2)}%)</span>
                </div>
            </div>
        `).join('');
    }

    // 네비게이션 플레이스홀더
    function goToSetting() {
      console.log("Move to Setting Page");
      // location.href = 'setting.html'; // 2단계에서 구현
    }

    function goToChart(ticker) {
      console.log(`Move to Chart View: ${ticker}`);
      // location.href = `chart.html?id=${ticker}`; // 3단계에서 구현
    }

    // 초기화 실행
    window.onload = () => {
      initNickname();
      renderList();
      lucide.createIcons(); // 아이콘 생성
    };
  </script>

</body>

</html>
