<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indexly - Market Chart</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 캔들 차트 확장 라이브러리 (Financial Plugin & Date Adapter) -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1a222e;
            --input-bg: #111827;
            --primary-blue: #3498db;
            --primary-green: #26AD8D;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-color: #2d3748;
            --up-color: #ef4444;
            --down-color: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* 메인 페이지 레이아웃 */
        .chart-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .chart-header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 장 상태 뱃지 */
        .market-status {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #334155;
            color: var(--text-dim);
        }

        .status-open {
            background: rgba(38, 173, 141, 0.2);
            color: var(--primary-green);
        }

        .price-hero {
            margin-bottom: 20px;
        }

        .current-price {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Roboto Mono', monospace;
        }

        .price-change {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .up {
            color: var(--up-color);
        }

        .down {
            color: var(--down-color);
        }

        /* 컨트롤 영역 */
        .chart-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .tab-bar {
            display: flex;
            background: var(--card-bg);
            padding: 4px;
            border-radius: 12px;
            gap: 2px;
        }

        .tab {
            padding: 8px 14px;
            border-radius: 9px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            border: none;
            background: none;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--primary-blue);
            color: white;
        }

        .chart-type-select {
            background: var(--card-bg);
            color: var(--text-dim);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 8px;
            outline: none;
            font-size: 13px;
        }

        /* 차트 컨테이너 및 오버레이 */
        .chart-container {
            flex: 1;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: var(--card-bg);
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 알림 설정 레이어 (Full Screen) */
        #alertLayer {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 1000;
            display: none;
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .layer-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .layer-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 120px;
        }

        .section-title {
            color: #4db8ff;
            font-size: 15px;
            font-weight: 600;
            margin: 24px 0 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .state-btn {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            border: 1.5px solid var(--primary-blue);
            background: none;
            color: var(--primary-blue);
            font-weight: 700;
            cursor: pointer;
        }

        .state-btn.selected {
            background: var(--primary-green);
            border-color: var(--primary-green);
            color: white;
        }

        .input-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            background: var(--input-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .input-wrapper input {
            width: 85%;
            padding: 12px;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .unit {
            position: absolute;
            right: 12px;
            top: 12px;
            color: var(--text-dim);
        }

        .bottom-action {
            padding: 20px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .cta-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 17px;
            font-weight: bold;
            background: #2d3748;
            color: #718096;
            transition: 0.3s;
        }

        .cta-btn.enabled {
            background: var(--primary-green);
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(38, 173, 141, 0.3);
        }
    </style>
</head>

<body>
    <div class="chart-page">
        <!-- 헤더 영역 -->
        <div class="chart-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <button onclick="location.href='index.html'"
                    style="background:none; border:none; color:var(--text-dim); cursor:pointer;"><i
                        data-lucide="chevron-left"></i></button>
                <h1 id="ticker-display">INDEX <span id="status-badge" class="market-status">확인 중</span></h1>
            </div>
            <button onclick="toggleLayer(true)"
                style="background:none; border:none; color:var(--text-dim); cursor:pointer;"><i
                    data-lucide="bell"></i></button>
        </div>

        <!-- 가격 대시보드 -->
        <section class="price-hero">
            <div class="current-price" id="price-val">---</div>
            <div id="diff-area" class="price-change">-- (--)</div>
        </section>

        <!-- 차트 컨트롤 -->
        <div class="chart-controls">
            <div class="tab-bar">
                <button class="tab active" onclick="loadData('1d', this)">1D</button>
                <button class="tab" onclick="loadData('1w', this)">1W</button>
                <button class="tab" onclick="loadData('1m', this)">1M</button>
                <button class="tab" onclick="loadData('1y', this)">1Y</button>
            </div>
            <select id="chart-type" onchange="draw()" class="chart-type-select">
                <option value="line" selected>Line View</option>
                <option value="candlestick">Candle View</option>
            </select>
        </div>

        <!-- 차트 영역 -->
        <div class="chart-container">
            <div id="load-overlay" class="overlay" style="display:flex;">
                <div class="spinner"></div>
            </div>
            <div id="err-overlay" class="overlay">
                <i data-lucide="alert-circle" style="color:var(--up-color)" size="32"></i>
                <div style="color:var(--text-dim); font-size:0.9rem; text-align:center;">API Response
                    Error<br><small>백엔드 연결을 확인해주세요.</small></div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <!-- 시세 알림 레이어 -->
    <div id="alertLayer">
        <div class="layer-header">
            <button onclick="toggleLayer(false)"
                style="background:none; border:none; color:white; font-size:20px;">✕</button>
            <h2 style="font-size:18px;"><span id="modal-ticker">INDEX</span> Price Alert</h2>
            <div style="width:24px;"></div>
        </div>
        <div class="layer-content">
            <div class="section-title">1. 기준가 선택 (필수)</div>
            <div class="btn-group">
                <button class="state-btn selected" id="base-now" onclick="setBase('now')">현재가</button>
                <button class="state-btn" id="base-avg" onclick="setBase('avg')">1주일 평균가</button>
            </div>
            <div class="section-title">2. 상승 알림 설정</div>
            <div class="input-card">
                <div class="input-row">
                    <div class="input-wrapper"><input type="number" id="upInput" placeholder="상승 % 입력"
                            oninput="validateForm('up')"><span class="unit">%</span></div>
                    <select
                        style="background:var(--input-bg); color:white; border:1px solid var(--border-color); padding:10px; border-radius:8px;">
                        <option>오늘까지</option>
                    </select>
                </div>
                <div style="font-size:0.85rem; color:var(--text-dim); margin-top:8px;">예상 시세: <b id="up-preview"
                        style="color:white;">--</b></div>
            </div>
            <div class="section-title">3. 하락 알림 설정</div>
            <div class="input-card">
                <div class="input-row">
                    <div class="input-wrapper"><input type="number" id="downInput" placeholder="하락 % 입력"
                            oninput="validateForm('down')"><span class="unit">%</span></div>
                    <select
                        style="background:var(--input-bg); color:white; border:1px solid var(--border-color); padding:10px; border-radius:8px;">
                        <option>오늘까지</option>
                    </select>
                </div>
                <div style="font-size:0.85rem; color:var(--text-dim); margin-top:8px;">예상 시세: <b id="down-preview"
                        style="color:white;">--</b></div>
            </div>
            <div
                style="background: rgba(255,255,255,0.05); padding:18px; border-radius:12px; font-size:13px; color:var(--text-dim); line-height:1.6; margin-top:20px;">
                📌 <b>알림 종료 정책 :</b> 시세 도달 시 즉시 종료되며, 설정 기간 만료 시 또는 기간 내 미도달 시에도 자동 종료됩니다.
            </div>
        </div>
        <div class="bottom-action">
            <button id="ctaBtn" class="cta-btn" disabled onclick="alert('시세 알림이 등록되었습니다.'); toggleLayer(false);">Set
                Price Watch</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ticker = urlParams.get('id') || 'USD/KRW';
        let chartInstance, currentData = null, selectedBase = 'now';

        async function loadData(period, btn) {
            if (btn) {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            document.getElementById('load-overlay').style.display = 'flex';
            document.getElementById('err-overlay').style.display = 'none';

            try {
                const res = await fetch(`http://localhost:8000/api/chart/${encodeURIComponent(ticker)}?period=${period}`);
                if (!res.ok) throw new Error();
                currentData = await res.json();
                updateUI(currentData);
                draw();
                document.getElementById('load-overlay').style.display = 'none';
            } catch (e) {
                document.getElementById('load-overlay').style.display = 'none';
                document.getElementById('err-overlay').style.display = 'flex';
                lucide.createIcons();
            }
        }

        function updateUI(d) {
            const badge = document.getElementById('status-badge');
            badge.innerText = d.is_open ? '장 중' : '장 종료';
            badge.className = `market-status ${d.is_open ? 'status-open' : ''}`;

            document.getElementById('ticker-display').firstChild.textContent = d.ticker + ' ';
            document.getElementById('modal-ticker').innerText = d.ticker;
            document.getElementById('price-val').innerText = d.currentPrice.toLocaleString();
            document.getElementById('diff-area').innerText = `${d.diff >= 0 ? '▲' : '▼'} ${Math.abs(d.diff).toFixed(2)} (${d.percent}%)`;
            document.getElementById('diff-area').className = `price-change ${d.state}`;
        }

        function draw() {
            if (!currentData) return;
            const type = document.getElementById('chart-type').value;
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const isCandle = type === 'candlestick';
            chartInstance = new Chart(ctx, {
                type: isCandle ? 'candlestick' : 'line',
                data: {
                    labels: isCandle ? undefined : currentData.labels,
                    datasets: [{
                        label: ticker,
                        data: isCandle ? currentData.candles : currentData.prices,
                        borderColor: isCandle ? undefined : '#3498db',
                        borderWidth: isCandle ? 1 : 2,
                        tension: 0.4,
                        pointRadius: 0,
                        color: isCandle ? { up: '#ef4444', down: '#3b82f6', unchanged: '#94a3b8' } : undefined
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: isCandle ? 'time' : 'category', display: false },
                        y: { grid: { color: '#2d3748' }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function toggleLayer(s) { document.getElementById('alertLayer').style.display = s ? 'flex' : 'none'; if (s) lucide.createIcons(); }

        function setBase(type) {
            selectedBase = type;
            document.getElementById('base-now').classList.toggle('selected', type === 'now');
            document.getElementById('base-avg').classList.toggle('selected', type === 'avg');
            validateForm();
        }

        function validateForm(mode) {
            const up = document.getElementById('upInput').value;
            const down = document.getElementById('downInput').value;
            const cta = document.getElementById('ctaBtn');
            if (up.length > 0 || down.length > 0) {
                cta.disabled = false; cta.classList.add('enabled');
            } else {
                cta.disabled = true; cta.classList.remove('enabled');
            }
            if (mode) updatePreview(mode);
        }

        function updatePreview(mode) {
            const input = document.getElementById(mode === 'up' ? 'upInput' : 'downInput');
            const preview = document.getElementById(mode === 'up' ? 'up-preview' : 'down-preview');
            if (!input.value || !currentData) { preview.innerText = '--'; return; }
            const base = selectedBase === 'now' ? currentData.currentPrice : currentData.avgPrice;
            const pct = parseFloat(input.value);
            const res = mode === 'up' ? base * (1 + pct / 100) : base * (1 - pct / 100);
            preview.innerText = res.toLocaleString(undefined, { minimumFractionDigits: 2 });
        }

        window.onload = () => { loadData('1d'); lucide.createIcons(); };
    </script>
</body>

</html>
